path:
  initial_xyz: path.xyz
  nimages: 8
  freeze_endpoints: true
  reparameterization: cubic
  coordinate_mode: all_atoms

optimizer:
  method: zero_temperature_string
  step_size: 0.05
  max_steps: 50
  grad_tol: 1.0e-3
  disp_tol: 1.0e-3
  energy_tol: 1.0e-6

engine:
  type: qchem
  method: tddft
  basis: 6-31G*
  charge: 0
  multiplicity: 1
  nroots: 3
  root: 2
  state_follow: true
  template: qm.grad
  extra:
    input_filename: qm.inp
    output_filename: qm.out
    grad_filename: GRAD
    qchem_scratch: workdir

execution:
  mode: serial
  max_concurrent_images: 1
  threads_per_image: 1

qmmm:
  enabled: false
  qm_atoms: []
  update_region_only: false

output:
  run_dir: run-qchem
  checkpoint_every: 1
  write_xyz_every: 1
  write_table_every: 1

