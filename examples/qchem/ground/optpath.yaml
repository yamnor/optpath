path:
  initial_xyz: path.xyz
  nimages: 8
  freeze_endpoints: true
  reparameterization: cubic
  coordinate_mode: all_atoms

optimizer:
  method: zero_temperature_string
  step_size: 0.05
  max_steps: 50
  grad_tol: 1.0e-3
  disp_tol: 1.0e-3
  energy_tol: 1.0e-6

engine:
  type: qchem
  method: b3lyp
  basis: 6-31G*
  charge: 0
  multiplicity: 1
  template: qm.grad
  extra:
    input_filename: qm.inp
    output_filename: qm.out
    grad_filename: GRAD

execution:
  mode: serial
  max_concurrent_images: 1
  threads_per_image: 1

output:
  run_dir: run-qchem-ground
  checkpoint_every: 1
  write_xyz_every: 1
  write_table_every: 1
