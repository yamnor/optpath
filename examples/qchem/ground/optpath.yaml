path:
  initial_xyz: path.xyz
  nimages: 8
  freeze_endpoints: true
  reparameterization: cubic
  coordinate_mode: all_atoms

optimizer:
  method: zero_temperature_string
  step_size: 0.01
  max_steps: 20
  grad_tol: 1.0e-1
  disp_tol: 1.0e-1
  energy_tol: 1.0e-3

engine:
  type: qchem
  method: b3lyp
  basis: 6-31G*
  charge: 0
  multiplicity: 1
  template: qm.grad
  extra:
    input_filename: qm.inp
    output_filename: qm.out
    grad_filename: GRAD
    qchem_scratch: workdir

execution:
  mode: parallel_images
  total_slots: 10
  max_concurrent_images: 6
  threads_per_image: 1

output:
  run_dir: run-qchem
  checkpoint_every: 1
  write_xyz_every: 1
  write_table_every: 1
